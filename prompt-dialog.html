<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generate Wallpaper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0ff;
      padding: 20px;
      user-select: none;
      -webkit-app-region: drag;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 14px;
      color: #b8b8ff;
    }
    .field {
      margin-bottom: 12px;
      -webkit-app-region: no-drag;
    }
    label {
      display: block;
      font-size: 12px;
      color: #8888bb;
      margin-bottom: 4px;
    }
    input, textarea, select {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #333366;
      border-radius: 6px;
      color: #e0e0ff;
      font-size: 13px;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #6366f1;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row .field { flex: 1; }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      -webkit-app-region: no-drag;
    }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-generate {
      background: #6366f1;
      color: white;
    }
    .btn-generate:hover { background: #5558e6; }
    .btn-cancel {
      background: #333366;
      color: #b8b8ff;
    }
    .btn-cancel:hover { background: #444488; }
    .btn-preset {
      background: #4a3580;
      color: #d0c0ff;
      margin-bottom: 10px;
      flex: none;
      width: auto;
      padding: 6px 12px;
      font-size: 12px;
    }
    .btn-preset:hover { background: #5a45a0; }
    .presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      -webkit-app-region: no-drag;
    }
    .source-info {
      font-size: 11px;
      color: #6b6b9e;
      margin-top: 4px;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #8888bb;
      min-height: 16px;
    }
    .status.error { color: #ff6b6b; }
    .status.success { color: #6bff8b; }
  </style>
</head>
<body>
  <h2 id="title">Generate Wallpaper</h2>

  <label>Presets</label>
  <div class="presets">
    <button class="btn-preset" data-preset="lofi">Lofi Study</button>
    <button class="btn-preset" data-preset="lofi-night">Lofi Night</button>
    <button class="btn-preset" data-preset="lofi-rain">Lofi Rainy Day</button>
    <button class="btn-preset" data-preset="custom">Custom</button>
  </div>

  <div class="field">
    <label>Source</label>
    <select id="source">
      <option value="none">None (generate from scratch)</option>
      <option value="character">Use character PNG from images/</option>
    </select>
    <div class="source-info" id="sourceInfo"></div>
  </div>

  <div class="field">
    <label>Prompt</label>
    <textarea id="prompt" placeholder="Describe the wallpaper you want..."></textarea>
  </div>

  <div class="row">
    <div class="field">
      <label>Provider</label>
      <select id="provider">
        <option value="openrouter">OpenRouter (Images)</option>
        <option value="xai">xAI Grok (Images + Video)</option>
      </select>
    </div>
    <div class="field">
      <label>Type</label>
      <select id="type">
        <option value="image">Image</option>
        <option value="video" id="videoOption">Video (xAI only)</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Aspect Ratio</label>
      <select id="aspect">
        <option value="16:9">16:9</option>
        <option value="9:16">9:16</option>
        <option value="1:1">1:1</option>
        <option value="4:3">4:3</option>
        <option value="3:2">3:2</option>
      </select>
    </div>
  </div>

  <div class="row" id="videoOptions" style="display:none;">
    <div class="field">
      <label>Duration (seconds)</label>
      <select id="duration">
        <option value="5">5s</option>
        <option value="8">8s</option>
        <option value="10">10s</option>
        <option value="15">15s</option>
      </select>
    </div>
    <div class="field">
      <label>Resolution</label>
      <select id="resolution">
        <option value="480p">480p (faster)</option>
        <option value="720p">720p</option>
      </select>
    </div>
  </div>

  <div class="buttons">
    <button class="btn-cancel" id="cancelBtn">Cancel</button>
    <button class="btn-generate" id="generateBtn">Generate</button>
  </div>

  <div class="status" id="status"></div>

  <script>
    const { ipcRenderer } = require("electron");

    const providerEl = document.getElementById("provider");
    const typeEl = document.getElementById("type");
    const videoOption = document.getElementById("videoOption");
    const sourceEl = document.getElementById("source");
    const sourceInfo = document.getElementById("sourceInfo");
    const videoOpts = document.getElementById("videoOptions");
    const statusEl = document.getElementById("status");
    const generateBtn = document.getElementById("generateBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const promptEl = document.getElementById("prompt");

    // Get available character images and provider status
    const dialogConfig = ipcRenderer.sendSync("prompt-get-config");
    const characterImages = dialogConfig.characterImages || [];

    // Set provider availability
    if (!dialogConfig.hasOpenRouter) {
      providerEl.querySelector('[value="openrouter"]').textContent = "OpenRouter (not signed in)";
      providerEl.querySelector('[value="openrouter"]').disabled = true;
    }
    if (!dialogConfig.hasXai) {
      providerEl.querySelector('[value="xai"]').textContent = "xAI Grok (no API key)";
      providerEl.querySelector('[value="xai"]').disabled = true;
    }
    // Default to first available provider
    if (dialogConfig.hasXai) providerEl.value = "xai";
    else if (dialogConfig.hasOpenRouter) providerEl.value = "openrouter";

    // Toggle video option based on provider
    providerEl.addEventListener("change", () => {
      const isXai = providerEl.value === "xai";
      videoOption.disabled = !isXai;
      if (!isXai && typeEl.value === "video") typeEl.value = "image";
      videoOpts.style.display = (isXai && typeEl.value === "video") ? "flex" : "none";
    });

    if (characterImages.length > 0) {
      sourceInfo.textContent = "Found: " + characterImages[0];
    } else {
      sourceInfo.textContent = "No PNGs found in images/";
      sourceEl.querySelector('[value="character"]').disabled = true;
    }

    // Presets
    const presets = {
      "lofi": "The character sitting at a cozy desk in a warm, softly-lit study room, lo-fi anime aesthetic. Books, plants, a desk lamp glowing warmly, headphones on, studying peacefully. Warm color palette, gentle ambient lighting, studio ghibli inspired cozy atmosphere",
      "lofi-night": "The character sitting at a desk by a large window at night, city lights twinkling outside. Soft desk lamp, coffee mug steaming, books and papers scattered. Lo-fi anime aesthetic, deep blues and purples with warm lamp highlights, peaceful nighttime study vibes",
      "lofi-rain": "The character sitting at a desk next to a rain-streaked window, rainy day outside. Cozy room with warm lighting, plants on the windowsill, tea cup, open book. Lo-fi anime aesthetic, soft muted colors, calming rainy atmosphere, studio ghibli vibes",
      "custom": "",
    };

    document.querySelectorAll(".btn-preset").forEach(btn => {
      btn.addEventListener("click", () => {
        const preset = btn.dataset.preset;
        promptEl.value = presets[preset] || "";
        if (preset !== "custom") {
          sourceEl.value = characterImages.length > 0 ? "character" : "none";
          // Use video if xAI is available, otherwise image
          if (providerEl.value === "xai") {
            typeEl.value = "video";
            videoOpts.style.display = "flex";
          } else {
            typeEl.value = "image";
            videoOpts.style.display = "none";
          }
        }
      });
    });

    typeEl.addEventListener("change", () => {
      videoOpts.style.display = typeEl.value === "video" ? "flex" : "none";
    });

    cancelBtn.addEventListener("click", () => {
      ipcRenderer.send("prompt-cancel");
    });

    generateBtn.addEventListener("click", () => {
      const prompt = promptEl.value.trim();
      if (!prompt) {
        statusEl.textContent = "Please enter a prompt.";
        statusEl.className = "status error";
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = "Generating...";
      statusEl.textContent = typeEl.value === "video"
        ? "Generating video... this may take a few minutes."
        : "Generating image...";
      statusEl.className = "status";

      ipcRenderer.send("prompt-submit", {
        prompt,
        provider: providerEl.value,
        type: typeEl.value,
        source: sourceEl.value,
        aspectRatio: document.getElementById("aspect").value,
        duration: parseInt(document.getElementById("duration").value),
        resolution: document.getElementById("resolution").value,
      });
    });

    ipcRenderer.on("generation-status", (_e, msg) => {
      statusEl.textContent = msg;
      statusEl.className = "status";
    });

    ipcRenderer.on("generation-error", (_e, msg) => {
      statusEl.textContent = msg;
      statusEl.className = "status error";
      generateBtn.disabled = false;
      generateBtn.textContent = "Generate";
    });

    ipcRenderer.on("generation-success", (_e, msg) => {
      statusEl.textContent = msg;
      statusEl.className = "status success";
      setTimeout(() => ipcRenderer.send("prompt-cancel"), 2000);
    });
  </script>
</body>
</html>
