<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OpenRouter API Key</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0ff;
      padding: 20px;
      user-select: none;
      -webkit-app-region: drag;
    }
    h3 { font-size: 15px; margin-bottom: 8px; color: #b8b8ff; }
    p { font-size: 12px; color: #8888bb; margin-bottom: 12px; }
    a { color: #6366f1; cursor: pointer; text-decoration: underline; }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #333366;
      border-radius: 6px;
      color: #e0e0ff;
      font-size: 13px;
      outline: none;
      -webkit-app-region: no-drag;
    }
    input:focus { border-color: #6366f1; }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      -webkit-app-region: no-drag;
    }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-save { background: #6366f1; color: white; }
    .btn-save:hover { background: #5558e6; }
    .btn-cancel { background: #333366; color: #b8b8ff; }
    .btn-cancel:hover { background: #444488; }
  </style>
</head>
<body>
  <h3>OpenRouter API Key</h3>
  <p>Get your key from <a id="link">openrouter.ai/keys</a></p>
  <input id="key" type="password" placeholder="sk-or-v1-..." />
  <div class="buttons">
    <button class="btn-cancel" id="cancelBtn">Cancel</button>
    <button class="btn-save" id="saveBtn">Save</button>
  </div>
  <script>
    const { ipcRenderer, shell } = require("electron");
    document.getElementById("link").addEventListener("click", (e) => {
      e.preventDefault();
      shell.openExternal("https://openrouter.ai/keys");
    });
    document.getElementById("saveBtn").addEventListener("click", () => {
      const key = document.getElementById("key").value.trim();
      if (key) ipcRenderer.send("openrouter-key-save", key);
    });
    document.getElementById("cancelBtn").addEventListener("click", () => {
      ipcRenderer.send("openrouter-key-cancel");
    });
  </script>
</body>
</html>
