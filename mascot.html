<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mascot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      font-family: 'Segoe UI', sans-serif;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      padding-bottom: 4px;
    }

    /* Character sprite */
    #sprite {
      width: 120px;
      height: 120px;
      cursor: pointer;
      object-fit: contain;
      flex-shrink: 0;
    }
    #sprite:hover { transform: scale(1.05); }

    /* Chat area — hidden initially, appears below sprite */
    #chat {
      display: none;
      flex-direction: column;
      width: 320px;
      gap: 6px;
      margin-top: 4px;
      flex-shrink: 1;
      min-height: 0;
      overflow: hidden;
    }
    #chat.open { display: flex; }

    /* Chat boxes — start invisible, animated in by Motion */
    #messageBox, #inputBox {
      transform: scale(0);
      opacity: 0;
      transform-origin: top right;
    }

    /* Chat history — newest on top */
    #messageBox {
      background: rgba(20, 20, 45, 0.92);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 10px 12px;
      color: #e0e0ff;
      font-size: 13px;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
      word-wrap: break-word;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
    }
    #messageBox:empty { display: none !important; }
    #messageBox::-webkit-scrollbar { width: 4px; }
    #messageBox::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.4); border-radius: 2px; }
    #messageBox::-webkit-scrollbar-track { background: transparent; }
    .msg-entry .sender {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .msg-entry .sender.you { color: #6bff8b; }
    .msg-entry .sender.char { color: #b8b8ff; }
    .msg-entry .sender.system { color: #ff8b8b; }
    .msg-entry .text { word-wrap: break-word; }

    /* Input box — always visible when chat is open */
    #inputBox {
      display: flex;
      gap: 6px;
      background: rgba(20, 20, 45, 0.92);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 8px 10px;
      align-items: center;
      position: relative;
    }
    #inputField {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0e0ff;
      font-size: 13px;
      outline: none;
    }
    #inputField::placeholder { color: #6b6b9e; }
    #sendBtn {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    #sendBtn:hover { background: #5558e6; }
    #sendBtn:disabled { opacity: 0.5; cursor: default; }

    /* Waiting dots — overlay on top of input field */
    #waitingDots {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 4px;
      position: absolute;
      left: 10px;
      right: 50px;
      top: 0;
      bottom: 0;
      pointer-events: none;
      opacity: 0.5;
    }
    #waitingDots.visible { display: inline-flex; }
    .wave-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8888bb;
      animation: wave 1s ease-in-out infinite;
    }
    .wave-dot:nth-child(2) { animation-delay: 0.15s; }
    .wave-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes wave {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="container">
    <img id="sprite" />
    <div id="chat">
      <div id="messageBox"></div>
      <div id="inputBox">
        <input id="inputField" type="text" placeholder="Type a message..." />
        <span id="waitingDots"><span class="wave-dot"></span><span class="wave-dot"></span><span class="wave-dot"></span></span>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script src="./node_modules/motion/dist/motion.js"></script>
  <script>
    const config = window.mascotAPI.getConfig();
    console.log("[mascot] Config:", JSON.stringify(config));
    const sprite = document.getElementById("sprite");
    const chat = document.getElementById("chat");
    const messageBox = document.getElementById("messageBox");
    const inputBox = document.getElementById("inputBox");
    const inputField = document.getElementById("inputField");
    const waitingDots = document.getElementById("waitingDots");
    const sendBtn = document.getElementById("sendBtn");

    let chatOpen = false;
    let waiting = false;
    let animating = false;

    // Load sprite using file:// URL
    if (config.spriteFile && config.imagesDir) {
      const url = "file:///" + (config.imagesDir + "/" + config.spriteFile).replace(/\\/g, "/");
      sprite.src = url;
      sprite.onload = () => console.log("[mascot] Sprite loaded OK");
      sprite.onerror = (e) => console.error("[mascot] Sprite load FAILED:", e);
    }

    const { animate } = Motion;

    async function openChat() {
      if (animating) return;
      animating = true;
      chatOpen = true;
      // Sprite slides up
      animate(sprite, { y: [0, -10] }, { duration: 0.2, easing: "ease-out" });
      // Chat appears below
      chat.classList.add("open");
      await animate(messageBox, { scale: [0, 1], opacity: [0, 1] }, { duration: 0.25, easing: [0.34, 1.56, 0.64, 1] }).finished;
      await animate(inputBox, { scale: [0, 1], opacity: [0, 1] }, { duration: 0.2, easing: [0.34, 1.56, 0.64, 1] }).finished;
      animating = false;
      inputField.focus();
    }

    async function closeChat() {
      if (animating) return;
      animating = true;
      chatOpen = false;
      await animate(inputBox, { scale: [1, 0], opacity: [1, 0] }, { duration: 0.15, easing: [0.36, 0, 0.66, -0.56] }).finished;
      await animate(messageBox, { scale: [1, 0], opacity: [1, 0] }, { duration: 0.15, easing: [0.36, 0, 0.66, -0.56] }).finished;
      chat.classList.remove("open");
      // Sprite slides back down
      await animate(sprite, { y: [-10, 0] }, { duration: 0.2, easing: "ease-out" }).finished;
      animating = false;
    }

    sprite.addEventListener("click", () => {
      if (chatOpen) closeChat();
      else openChat();
    });

    const waitingDots2 = document.getElementById("waitingDots");

    function addMessage(sender, text, type) {
      const entry = document.createElement("div");
      entry.className = "msg-entry";
      entry.innerHTML = `<div class="sender ${type}">${sender}</div><div class="text"></div>`;
      entry.querySelector(".text").textContent = text;
      messageBox.prepend(entry);
      return entry;
    }

    let lastUserEntry = null;

    function setWaiting(on) {
      waiting = on;
      if (on) {
        waitingDots2.classList.add("visible");
      } else {
        waitingDots2.classList.remove("visible");
        lastUserEntry = null;
      }
    }

    function sendMessage() {
      const text = inputField.value.trim();
      if (!text) return;

      // If resending while waiting, replace the previous user message in UI
      if (waiting && lastUserEntry) {
        lastUserEntry.querySelector(".text").textContent = text;
      } else {
        lastUserEntry = addMessage("You", text, "you");
      }

      inputField.value = "";
      setWaiting(true);
      window.mascotAPI.sendChat(text);
    }

    sendBtn.addEventListener("click", sendMessage);
    inputField.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // AI response
    window.mascotAPI.onResponse((response) => {
      console.log("[mascot-chat] Got response:", response.slice(0, 80));
      addMessage(config.characterName || "Character", response, "char");
      setWaiting(false);
      inputField.focus();
    });

    window.mascotAPI.onError((error) => {
      console.log("[mascot-chat] Got error:", error);
      addMessage("Error", error, "system");
      setWaiting(false);
      inputField.focus();
    });

    // Unsolicited screen commentary from AI
    window.mascotAPI.onScreenComment((comment) => {
      addMessage(config.characterName || "Character", comment, "char");
      if (!chatOpen) openChat();
    });
  </script>
</body>
</html>
