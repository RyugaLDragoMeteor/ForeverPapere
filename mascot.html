<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mascot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      height: 100%;
    }

    #container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      height: 100%;
      padding: 4px;
    }

    /* Chat area — hidden initially, appears above sprite */
    #chat {
      display: none;
      flex-direction: column;
      width: 320px;
      gap: 6px;
      margin-top: 4px;
    }
    #chat.open { display: flex; }

    /* Character sprite — anchored at bottom */
    #sprite {
      width: 120px;
      height: 120px;
      cursor: pointer;
      object-fit: contain;
      flex-shrink: 0;
    }
    #sprite:hover { transform: scale(1.05); }

    /* Chat boxes — start invisible, animated in by Motion */
    #messageBox, #inputBox {
      transform: scale(0);
      opacity: 0;
      transform-origin: bottom right;
    }

    /* Top box: scrollable chat history */
    #messageBox {
      background: rgba(20, 20, 45, 0.92);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 10px 12px;
      color: #e0e0ff;
      font-size: 13px;
      line-height: 1.5;
      min-height: 50px;
      max-height: 200px;
      overflow-y: auto;
      word-wrap: break-word;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #messageBox::-webkit-scrollbar { width: 4px; }
    #messageBox::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.4); border-radius: 2px; }
    #messageBox::-webkit-scrollbar-track { background: transparent; }
    .msg-entry .sender {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .msg-entry .sender.you { color: #6bff8b; }
    .msg-entry .sender.char { color: #b8b8ff; }
    .msg-entry .sender.system { color: #ff8b8b; }
    .msg-entry .text { word-wrap: break-word; }

    /* Bottom box: input / waiting indicator */
    #inputBox {
      display: flex;
      gap: 6px;
      background: rgba(20, 20, 45, 0.92);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 8px 10px;
      align-items: center;
    }
    #inputField {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0e0ff;
      font-size: 13px;
      outline: none;
    }
    #inputField::placeholder { color: #6b6b9e; }
    #waitingDots {
      display: none;
      flex: 1;
      color: #8888bb;
      font-size: 16px;
      font-style: italic;
      letter-spacing: 3px;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    #sendBtn {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    #sendBtn:hover { background: #5558e6; }
    #sendBtn:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div id="container">
    <img id="sprite" />
    <div id="chat">
      <div id="messageBox">
        <div class="msg-entry">
          <div class="sender char" id="msgSender"></div>
          <div class="text" id="msgText">Click me to chat!</div>
        </div>
      </div>
      <div id="inputBox">
        <input id="inputField" type="text" placeholder="Type a message..." />
        <span id="waitingDots">...</span>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script src="./node_modules/motion/dist/motion.js"></script>
  <script>
    const config = window.mascotAPI.getConfig();
    console.log("[mascot] Config:", JSON.stringify(config));
    const sprite = document.getElementById("sprite");
    const chat = document.getElementById("chat");
    const messageBox = document.getElementById("messageBox");
    const inputBox = document.getElementById("inputBox");
    const inputField = document.getElementById("inputField");
    const waitingDots = document.getElementById("waitingDots");
    const sendBtn = document.getElementById("sendBtn");

    let chatOpen = false;
    let waiting = false;
    let animating = false;

    // Load sprite using file:// URL
    if (config.spriteFile && config.imagesDir) {
      const url = "file:///" + (config.imagesDir + "/" + config.spriteFile).replace(/\\/g, "/");
      sprite.src = url;
      sprite.onload = () => console.log("[mascot] Sprite loaded OK");
      sprite.onerror = (e) => console.error("[mascot] Sprite load FAILED:", e);
    }

    const { animate } = Motion;

    async function openChat() {
      if (animating) return;
      animating = true;
      chatOpen = true;
      // Sprite slides up
      animate(sprite, { y: [0, -10] }, { duration: 0.2, easing: "ease-out" });
      // Chat appears below
      chat.classList.add("open");
      await animate(messageBox, { scale: [0, 1], opacity: [0, 1] }, { duration: 0.25, easing: [0.34, 1.56, 0.64, 1] }).finished;
      await animate(inputBox, { scale: [0, 1], opacity: [0, 1] }, { duration: 0.2, easing: [0.34, 1.56, 0.64, 1] }).finished;
      animating = false;
      inputField.focus();
    }

    async function closeChat() {
      if (animating) return;
      animating = true;
      chatOpen = false;
      await animate(inputBox, { scale: [1, 0], opacity: [1, 0] }, { duration: 0.15, easing: [0.36, 0, 0.66, -0.56] }).finished;
      await animate(messageBox, { scale: [1, 0], opacity: [1, 0] }, { duration: 0.15, easing: [0.36, 0, 0.66, -0.56] }).finished;
      chat.classList.remove("open");
      // Sprite slides back down
      await animate(sprite, { y: [-10, 0] }, { duration: 0.2, easing: "ease-out" }).finished;
      animating = false;
    }

    sprite.addEventListener("click", () => {
      if (chatOpen) closeChat();
      else openChat();
    });

    const msgSender = document.getElementById("msgSender");
    const msgText = document.getElementById("msgText");

    function showMessage(sender, text, type) {
      msgSender.textContent = sender;
      msgSender.className = "sender " + type;
      msgText.textContent = text;
      messageBox.scrollTop = 0;
    }

    function setWaiting(on) {
      waiting = on;
      inputField.style.display = on ? "none" : "block";
      waitingDots.style.display = on ? "block" : "none";
      sendBtn.style.display = on ? "none" : "block";
    }

    function sendMessage() {
      const text = inputField.value.trim();
      if (!text || waiting) return;

      showMessage("You", text, "you");
      inputField.value = "";
      setWaiting(true);
      window.mascotAPI.sendChat(text);
    }

    sendBtn.addEventListener("click", sendMessage);
    inputField.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // AI response
    window.mascotAPI.onResponse((response) => {
      showMessage(config.characterName || "Character", response, "char");
      setWaiting(false);
      inputField.focus();
    });

    window.mascotAPI.onError((error) => {
      showMessage("Error", error, "system");
      setWaiting(false);
      inputField.focus();
    });

    // Unsolicited screen commentary from AI
    window.mascotAPI.onScreenComment((comment) => {
      showMessage(config.characterName || "Character", comment, "char");
      if (!chatOpen) openChat();
    });
  </script>
</body>
</html>
