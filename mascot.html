<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mascot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #container {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      height: 100%;
      padding: 4px;
    }

    /* Character sprite */
    #sprite {
      width: 120px;
      height: 120px;
      cursor: pointer;
      object-fit: contain;
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    #sprite:hover { transform: scale(1.05); }

    /* Chat area (hidden by default) */
    #chat {
      display: none;
      flex-direction: column;
      width: 320px;
      gap: 6px;
      margin-top: 4px;
    }
    #chat.open { display: flex; }

    /* Top box: scrollable chat history */
    #messageBox {
      background: rgba(20, 20, 45, 0.92);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 10px 12px;
      color: #e0e0ff;
      font-size: 13px;
      line-height: 1.5;
      min-height: 50px;
      max-height: 200px;
      overflow-y: auto;
      word-wrap: break-word;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #messageBox::-webkit-scrollbar { width: 4px; }
    #messageBox::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.4); border-radius: 2px; }
    #messageBox::-webkit-scrollbar-track { background: transparent; }
    .msg-entry .sender {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .msg-entry .sender.you { color: #6bff8b; }
    .msg-entry .sender.char { color: #b8b8ff; }
    .msg-entry .sender.system { color: #ff8b8b; }
    .msg-entry .text { word-wrap: break-word; }

    /* Bottom box: input / waiting indicator */
    #inputBox {
      display: flex;
      gap: 6px;
      background: rgba(20, 20, 45, 0.92);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 8px 10px;
      align-items: center;
    }
    #inputField {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0e0ff;
      font-size: 13px;
      outline: none;
    }
    #inputField::placeholder { color: #6b6b9e; }
    #waitingDots {
      display: none;
      flex: 1;
      color: #8888bb;
      font-size: 16px;
      font-style: italic;
      letter-spacing: 3px;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    #sendBtn {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    #sendBtn:hover { background: #5558e6; }
    #sendBtn:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div id="container">
    <img id="sprite" />
    <div id="chat">
      <div id="messageBox">
        <div class="msg-entry">
          <div class="sender char" id="msgSender"></div>
          <div class="text" id="msgText">Click me to chat!</div>
        </div>
      </div>
      <div id="inputBox">
        <input id="inputField" type="text" placeholder="Type a message..." />
        <span id="waitingDots">...</span>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const config = window.mascotAPI.getConfig();
    console.log("[mascot] Config:", JSON.stringify(config));
    const sprite = document.getElementById("sprite");
    const chat = document.getElementById("chat");
    const messageBox = document.getElementById("messageBox");
    const inputField = document.getElementById("inputField");
    const waitingDots = document.getElementById("waitingDots");
    const sendBtn = document.getElementById("sendBtn");

    let chatOpen = false;
    let waiting = false;

    // Load sprite using file:// URL
    if (config.spriteFile && config.imagesDir) {
      const url = "file:///" + (config.imagesDir + "/" + config.spriteFile).replace(/\\/g, "/");
      sprite.src = url;
      sprite.onload = () => console.log("[mascot] Sprite loaded OK");
      sprite.onerror = (e) => console.error("[mascot] Sprite load FAILED:", e);
    }

    // Click sprite to toggle chat
    sprite.addEventListener("click", () => {
      chatOpen = !chatOpen;
      chat.classList.toggle("open", chatOpen);
      window.mascotAPI.toggleChat(chatOpen);
      if (chatOpen) inputField.focus();
    });

    const msgSender = document.getElementById("msgSender");
    const msgText = document.getElementById("msgText");

    function showMessage(sender, text, type) {
      msgSender.textContent = sender;
      msgSender.className = "sender " + type;
      msgText.textContent = text;
      // Scroll to top of message
      messageBox.scrollTop = 0;
    }

    function setWaiting(on) {
      waiting = on;
      inputField.style.display = on ? "none" : "block";
      waitingDots.style.display = on ? "block" : "none";
      sendBtn.style.display = on ? "none" : "block";
    }

    function sendMessage() {
      const text = inputField.value.trim();
      if (!text || waiting) return;

      showMessage("You", text, "you");
      inputField.value = "";
      setWaiting(true);
      window.mascotAPI.sendChat(text);
    }

    sendBtn.addEventListener("click", sendMessage);
    inputField.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // AI response
    window.mascotAPI.onResponse((response) => {
      showMessage(config.characterName || "Character", response, "char");
      setWaiting(false);
      inputField.focus();
    });

    window.mascotAPI.onError((error) => {
      showMessage("Error", error, "system");
      setWaiting(false);
      inputField.focus();
    });
  </script>
</body>
</html>
