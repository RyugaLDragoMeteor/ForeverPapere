<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #overlay {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .calm-chatbox {
      position: absolute;
      width: 300px;
      min-height: 40px;
      background: rgba(20, 20, 45, 0.88);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 12px 14px;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      cursor: pointer;
      transition: opacity 2s ease;
    }
    .calm-chatbox:hover {
      border-color: rgba(255, 100, 100, 0.6);
    }
  </style>
</head>
<body>
  <div id="overlay"></div>
  <script>
    // Left click on a chatbox removes it
    document.getElementById("overlay").addEventListener("click", (e) => {
      const box = e.target.closest(".calm-chatbox");
      if (box && box.id) {
        box.remove();
        window.frontpaperAPI?.removeChatbox(box.id);
      }
    });
  </script>
</body>
</html>
