<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: no-drag;
      pointer-events: none;
    }
    #overlay {
      width: 100%;
      height: 100%;
      position: relative;
      pointer-events: none;
    }
    .calm-chatbox {
      position: absolute;
      width: 300px;
      min-height: 40px;
      background: rgba(20, 20, 45, 0.88);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 12px 14px;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: auto;
      transition: opacity 2s ease;
      cursor: default;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <!-- Chatboxes spawned dynamically by heatmap -->
  </div>
  <script>
    let isOverChatbox = false;

    // Throttled hover detection — only sends IPC when state changes
    document.addEventListener("mousemove", (e) => {
      const over = !!e.target?.closest?.(".calm-chatbox");
      if (over !== isOverChatbox) {
        isOverChatbox = over;
        window.frontpaperAPI?.setHover(over);
      }
    });

    // Middle click removes the chatbox
    document.addEventListener("mousedown", (e) => {
      if (e.button === 1) {
        const box = e.target?.closest?.(".calm-chatbox");
        if (box?.id) {
          e.preventDefault();
          window.frontpaperAPI?.removeChatbox(box.id);
        }
      }
    });

    // Prevent middle-click paste/scroll on chatboxes
    document.addEventListener("auxclick", (e) => {
      if (e.button === 1) e.preventDefault();
    });
  </script>
</body>
</html>
