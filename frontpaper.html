<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: no-drag;
      pointer-events: none;
    }
    #overlay {
      width: 100%;
      height: 100%;
      position: relative;
      pointer-events: none;
    }
    .frontpaper-element {
      pointer-events: none;
      position: absolute;
    }
    #test-text {
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 48px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <!-- Frontpaper elements go here -->
  </div>
</body>
</html>
