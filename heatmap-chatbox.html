<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    #box {
      background: rgba(20, 20, 45, 0.88);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 12px 14px;
      color: #e0e0ff;
      font-size: 13px;
      line-height: 1.5;
      margin: 4px;
      min-height: 40px;
    }
  </style>
</head>
<body>
  <div id="box">Waiting for a thought...</div>
</body>
</html>
