<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
    }
    #box {
      background: rgba(20, 20, 45, 0.88);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 12px;
      padding: 12px 14px;
      color: #e0e0ff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="box">A new thought...</div>
  <script>
    document.getElementById("box").addEventListener("mousedown", () => {
      document.body.style.display = "none";
      window.bubbleAPI?.close();
    });
  </script>
</body>
</html>
